<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' http://localhost:* ws://localhost:* data: blob:; script-src 'self' 'unsafe-inline' http://localhost:*; img-src 'self' https: http: data: blob:; connect-src 'self' https: http: ws: wss:; style-src 'self' 'unsafe-inline' http://localhost:*; font-src 'self' data:;" />
    <title>HyeniMC</title>
    <style>
      /* React 마운트 전까지 흰 화면 대신 앱 배경색 + 스피너 표시 */
      #app-boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0a0a0f;
      }
      #app-boot .spinner {
        width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.12);
        border-top-color: #ec4899; border-radius: 50%; animation: hyeni-boot-spin 0.8s linear infinite;
      }
      @keyframes hyeni-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
